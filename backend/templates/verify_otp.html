<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Verify OTP
    </title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .otp-box{
            background:white;
            padding:30px;
            border-radius:10px;
            width:350px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            margin-bottom:15px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

<div class="otp-box">

    <h2>
        Email Verification
    </h2>

    <p>
        Enter OTP sent to your email
    </p>

    <form method="POST">

        <input
            type="text"
            name="otp"
            placeholder="Enter OTP"
            required
        >

        <button type="submit">

            Verify OTP

        </button>

    </form>

</div>

</body>

</html>
